name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-test:
    name: "Test (OS: ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Package with ncc
        run: npm run package

      - name: Run unit tests
        run: npm test

  lint:
    name: TypeScript type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  test-scenarios:
    name: Integration scenarios
    needs: unit-test
    runs-on: ubuntu-latest

    steps:
      # === 6 种内置 shell ===
      - name: bash
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: echo "bash works"

      - name: sh
        uses: ttttstc/official_shell@main
        with:
          shell: sh
          script: echo "sh works"

      - name: pwsh
        uses: ttttstc/official_shell@main
        with:
          shell: pwsh
          script: Write-Host "pwsh works"

      - name: powershell
        uses: ttttstc/official_shell@main
        with:
          shell: powershell
          script: Write-Host "powershell works"

      - name: cmd
        uses: ttttstc/official_shell@main
        with:
          shell: cmd
          script: echo cmd works

      - name: python
        uses: ttttstc/official_shell@main
        with:
          shell: python
          script: print("python works")

      # === 自定义模板 ===
      - name: custom template bash -e {0}
        uses: ttttstc/official_shell@main
        with:
          shell: bash -e {0}
          script: echo "custom bash -e works"

      - name: custom template node -e {0}
        uses: ttttstc/official_shell@main
        with:
          shell: node -e {0}
          script: console.log("node -e works")

      - name: custom template perl {0}
        uses: ttttstc/official_shell@main
        with:
          shell: perl {0}
          script: print "perl works\n"

      # === 多行脚本 ===
      - name: multiline bash
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: |
            echo "line 1"
            echo "line 2"
            echo "line 3"

      - name: multiline pwsh
        uses: ttttstc/official_shell@main
        with:
          shell: pwsh
          script: |
            Write-Host "line 1"
            Write-Host "line 2"
            Write-Host "line 3"

      # === working-directory ===
      - name: working-directory
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          working-directory: /tmp
          script: pwd && echo "running in /tmp"

      # === 大小写不敏感 ===
      - name: shell case-insensitive BASH
        uses: ttttstc/official_shell@main
        with:
          shell: BASH
          script: echo "BASH uppercase works"

      - name: shell case-insensitive Python
        uses: ttttstc/official_shell@main
        with:
          shell: Python
          script: print("Python uppercase works")

      # === 退出码验证 ===
      - name: exit code 0
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: exit 0

      - name: exit code non-zero (expect failure)
        uses: ttttstc/official_shell@main
        continue-on-error: true
        with:
          shell: bash
          script: exit 1
