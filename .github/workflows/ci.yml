name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-test:
    name: "Test (OS: ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Package with ncc
        run: npm run package

      - name: Run unit tests
        run: npm test

  lint:
    name: TypeScript type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  test-scenarios:
    name: Integration scenarios
    needs: unit-test
    runs-on: ubuntu-latest

    steps:
      - name: Scenario bash
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: echo "bash works"

      - name: Scenario sh
        uses: ttttstc/official_shell@main
        with:
          shell: sh
          script: echo "sh works"

      - name: Scenario pwsh
        uses: ttttstc/official_shell@main
        with:
          shell: pwsh
          script: Write-Host "pwsh works"

      - name: Scenario python
        uses: ttttstc/official_shell@main
        with:
          shell: python
          script: print("python works")

      - name: Scenario cmd
        uses: ttttstc/official_shell@main
        with:
          shell: cmd
          script: echo cmd works

      - name: Scenario custom template
        uses: ttttstc/official_shell@main
        with:
          shell: bash -e {0}
          script: echo "custom template works"
