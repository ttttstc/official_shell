name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # === Linux 场景 ===
  test-scenarios-linux:
    name: Scenarios (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: bash
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: echo "bash works"

      - name: sh
        uses: ttttstc/official_shell@main
        with:
          shell: sh
          script: echo "sh works"

      - name: pwsh
        uses: ttttstc/official_shell@main
        with:
          shell: pwsh
          script: Write-Host "pwsh works"

      - name: python
        uses: ttttstc/official_shell@main
        with:
          shell: python
          script: print("python works")

      - name: custom template bash -e {0}
        uses: ttttstc/official_shell@main
        with:
          shell: bash -e {0}
          script: echo "custom bash -e works"

      - name: custom template node {0}
        uses: ttttstc/official_shell@main
        with:
          shell: node {0}
          script: console.log("node works")

      - name: custom template perl {0}
        uses: ttttstc/official_shell@main
        with:
          shell: perl {0}
          script: print "perl works\n"

      - name: multiline bash
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: |
            echo "line 1"
            echo "line 2"
            echo "line 3"

      - name: multiline pwsh
        uses: ttttstc/official_shell@main
        with:
          shell: pwsh
          script: |
            Write-Host "line 1"
            Write-Host "line 2"
            Write-Host "line 3"

      - name: working-directory
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          working-directory: /tmp
          script: pwd && echo "running in /tmp"

      - name: shell case-insensitive BASH
        uses: ttttstc/official_shell@main
        with:
          shell: BASH
          script: echo "BASH uppercase works"

      - name: exit code 0
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: exit 0

      - name: exit code non-zero
        uses: ttttstc/official_shell@main
        continue-on-error: true
        with:
          shell: bash
          script: exit 1

      # --- 与官方 run step 对齐能力 ---

      - name: GITHUB_ENV 写入
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: |
            echo "MY_ENV_VAR=hello-from-step" >> "$GITHUB_ENV"
            echo "MY_MULTILINE<<EOF" >> "$GITHUB_ENV"
            echo "line 1" >> "$GITHUB_ENV"
            echo "line 2" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"

      - name: GITHUB_ENV 读取（下游 step）
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: |
            test "$MY_ENV_VAR" = "hello-from-step" || { echo "MY_ENV_VAR mismatch: $MY_ENV_VAR"; exit 1; }
            test "$MY_MULTILINE" = $'line 1\nline 2' || { echo "MY_MULTILINE mismatch: $MY_MULTILINE"; exit 1; }
            echo "GITHUB_ENV propagation works"

      - name: GITHUB_OUTPUT 写入
        id: outputs-linux
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: |
            echo "result=ok" >> "$GITHUB_OUTPUT"

      - name: GITHUB_OUTPUT 读取
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: |
            test "${{ steps.outputs-linux.outputs.result }}" = "ok" || { echo "output mismatch"; exit 1; }
            echo "GITHUB_OUTPUT propagation works"

      - name: step env 注入
        uses: ttttstc/official_shell@main
        env:
          STEP_LEVEL_ENV: from-step-env
        with:
          shell: bash
          script: |
            test "$STEP_LEVEL_ENV" = "from-step-env" || { echo "STEP_LEVEL_ENV mismatch: $STEP_LEVEL_ENV"; exit 1; }
            echo "step env injection works"

  # === Windows 场景 ===
  test-scenarios-windows:
    name: Scenarios (Windows)
    runs-on: windows-latest

    steps:
      - name: powershell (Windows PowerShell)
        uses: ttttstc/official_shell@main
        with:
          shell: powershell
          script: Write-Host "powershell works"

      - name: pwsh (PowerShell Core)
        uses: ttttstc/official_shell@main
        with:
          shell: pwsh
          script: Write-Host "pwsh works"

      - name: cmd
        uses: ttttstc/official_shell@main
        with:
          shell: cmd
          script: echo cmd works

      - name: python
        uses: ttttstc/official_shell@main
        with:
          shell: python
          script: print("python works")

      - name: bash (Git Bash)
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: echo "bash works"

      - name: sh (MSYS2)
        uses: ttttstc/official_shell@main
        with:
          shell: sh
          script: echo "sh works"

      - name: multiline powershell
        uses: ttttstc/official_shell@main
        with:
          shell: powershell
          script: |
            Write-Host "line 1"
            Write-Host "line 2"
            Write-Host "line 3"

      - name: multiline cmd
        uses: ttttstc/official_shell@main
        with:
          shell: cmd
          script: |
            echo line 1
            echo line 2
            echo line 3

      - name: working-directory
        uses: ttttstc/official_shell@main
        with:
          shell: powershell
          working-directory: ${{ runner.temp }}
          script: pwd

      - name: exit code 0
        uses: ttttstc/official_shell@main
        with:
          shell: cmd
          script: exit 0

      - name: exit code non-zero
        uses: ttttstc/official_shell@main
        continue-on-error: true
        with:
          shell: cmd
          script: exit 1

      # --- 与官方 run step 对齐能力 ---

      - name: GITHUB_ENV 写入 (powershell)
        uses: ttttstc/official_shell@main
        with:
          shell: powershell
          script: |
            "MY_ENV_VAR=hello-from-step" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: GITHUB_ENV 读取 (powershell)
        uses: ttttstc/official_shell@main
        with:
          shell: powershell
          script: |
            if ($env:MY_ENV_VAR -ne "hello-from-step") { Write-Host "MY_ENV_VAR mismatch: $env:MY_ENV_VAR"; exit 1 }
            Write-Host "GITHUB_ENV propagation works"

      - name: GITHUB_OUTPUT 写入 (cmd)
        id: outputs-windows
        uses: ttttstc/official_shell@main
        with:
          shell: cmd
          script: |
            echo result=ok>>%GITHUB_OUTPUT%

      - name: GITHUB_OUTPUT 读取
        uses: ttttstc/official_shell@main
        with:
          shell: powershell
          script: |
            if ("${{ steps.outputs-windows.outputs.result }}" -ne "ok") { Write-Host "output mismatch"; exit 1 }
            Write-Host "GITHUB_OUTPUT propagation works"

      - name: step env 注入
        uses: ttttstc/official_shell@main
        env:
          STEP_LEVEL_ENV: from-step-env
        with:
          shell: powershell
          script: |
            if ($env:STEP_LEVEL_ENV -ne "from-step-env") { Write-Host "STEP_LEVEL_ENV mismatch: $env:STEP_LEVEL_ENV"; exit 1 }
            Write-Host "step env injection works"

  # === macOS 场景 ===
  test-scenarios-macos:
    name: Scenarios (macOS)
    runs-on: macos-latest

    steps:
      - name: bash
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: echo "bash works"

      - name: sh
        uses: ttttstc/official_shell@main
        with:
          shell: sh
          script: echo "sh works"

      - name: pwsh
        uses: ttttstc/official_shell@main
        with:
          shell: pwsh
          script: Write-Host "pwsh works"

      - name: python
        uses: ttttstc/official_shell@main
        with:
          shell: python
          script: print("python works")

      - name: zsh (default macOS shell)
        uses: ttttstc/official_shell@main
        with:
          shell: zsh -e {0}
          script: echo "zsh works"

      - name: custom template bash -e {0}
        uses: ttttstc/official_shell@main
        with:
          shell: bash -e {0}
          script: echo "custom bash -e works"

      - name: multiline bash
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: |
            echo "line 1"
            echo "line 2"

      - name: working-directory
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          working-directory: /tmp
          script: pwd && echo "running in /tmp"

      - name: exit code 0
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: exit 0

      - name: exit code non-zero
        uses: ttttstc/official_shell@main
        continue-on-error: true
        with:
          shell: bash
          script: exit 1

      # --- 与官方 run step 对齐能力 ---

      - name: GITHUB_ENV 写入
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: |
            echo "MY_ENV_VAR=hello-from-step" >> "$GITHUB_ENV"

      - name: GITHUB_ENV 读取
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: |
            test "$MY_ENV_VAR" = "hello-from-step" || { echo "MY_ENV_VAR mismatch: $MY_ENV_VAR"; exit 1; }
            echo "GITHUB_ENV propagation works"

      - name: GITHUB_OUTPUT 写入
        id: outputs-macos
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: |
            echo "result=ok" >> "$GITHUB_OUTPUT"

      - name: GITHUB_OUTPUT 读取
        uses: ttttstc/official_shell@main
        with:
          shell: bash
          script: |
            test "${{ steps.outputs-macos.outputs.result }}" = "ok" || { echo "output mismatch"; exit 1; }
            echo "GITHUB_OUTPUT propagation works"

      - name: step env 注入
        uses: ttttstc/official_shell@main
        env:
          STEP_LEVEL_ENV: from-step-env
        with:
          shell: bash
          script: |
            test "$STEP_LEVEL_ENV" = "from-step-env" || { echo "STEP_LEVEL_ENV mismatch: $STEP_LEVEL_ENV"; exit 1; }
            echo "step env injection works"
